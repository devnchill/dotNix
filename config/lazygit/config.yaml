customCommands:
  - key: "C"
    command: |
      git commit -m "{{ .Form.Type }}{{if .Form.Scopes}}({{ .Form.Scopes }}){{end}}: {{ .Form.Description }}" \
      {{- if .Form.LongDescription }}
      -m "{{ .Form.LongDescription }}" \
      {{- end }}
      {{- if .Form.BreakingChange }}
      -m "BREAKING CHANGE: {{ .Form.BreakingChange }}"
      {{- end }}
    description: "commit with commitizen"
    context: "files"
    prompts:
      - type: "menu"
        title: "Select the type of change you are committing."
        key: "Type"
        options:
          - name: "Feature m"
            description: "a new feature"
            value: "feat"
          - name: "Fix p"
            description: "a bug fix"
            value: "fix"
          - name: "Documentation p"
            description: "Documentation only changes"
            value: "docs"
          - name: "Styles"
            description: "Changes that do not affect the meaning of the code (white-space, formatting, missing semi-colons, etc)"
            value: "style"
          - name: "Code Refactoring p"
            description: "A code change that neither fixes a bug nor adds a feature"
            value: "refactor"
          - name: "Performance Improvements p"
            description: "A code change that improves performance"
            value: "perf"
          - name: "Tests"
            description: "Adding missing tests or correcting existing tests"
            value: "test"
          - name: "Builds"
            description: "Changes that affect the build system or external dependencies (example scopes: gulp, broccoli, npm)"
            value: "build"
          - name: "Continuous Integration"
            description: "Changes to our CI configuration files and scripts (example scopes: Travis, Circle, BrowserStack, SauceLabs)"
            value: "ci"
          - name: "Chores p"
            description: "Other changes that don't modify src or test files"
            value: "chore"
          - name: "Reverts"
            description: "Reverts a previous commit"
            value: "revert"
      - type: "input"
        title: "Enter the scope(s) of this change."
        key: "Scopes"
      - type: "input"
        title: "Enter the short description of the change."
        key: "Description"
      - type: "input"
        title: "Enter a more detailed description (optional)."
        key: "LongDescription"
      - type: "input"
        title: "Describe the breaking change, if any (leave empty if none)."
        key: "BreakingChange"
      - type: "confirm"
        title: "Is the commit message correct?"
        body: |
          {{ .Form.Type }}{{if .Form.Scopes}}({{ .Form.Scopes }}){{end}}: {{ .Form.Description }}
          {{- if .Form.LongDescription }}

          {{ .Form.LongDescription }}
          {{- end }}
          {{- if .Form.BreakingChange }}

          BREAKING CHANGE: {{ .Form.BreakingChange }}
          {{- end }}
  - key: "B"
    command: |
      LAST_COMMIT=$(git log -1 --pretty=%B)

      if echo "$LAST_COMMIT" | grep -q "BREAKING CHANGE"; then
        BUMP="major"
      elif echo "$LAST_COMMIT" | grep -q "^feat"; then
        BUMP="minor"
      elif echo "$LAST_COMMIT" | grep -qE "^(fix|docs|refactor|perf|chore)"; then
        BUMP="patch"
      else
        echo "No version bump needed (style/test/build/ci/revert)."
        exit 0
      fi

      echo "${BUMP} change detected."

      VERSION_FILE=""
      for f in package.json Cargo.toml pyproject.toml *.cabal package.yaml VERSION version.txt version.rb; do
        # shellcheck disable=SC2086
        for g in $f; do
          if [ -f "$g" ]; then
            VERSION_FILE="$g"
            break 2
          fi
        done
      done

      if [ -z "$VERSION_FILE" ]; then
        echo "No version file found — skipping bump."
        exit 0
      fi

      echo "Repo: $(git remote get-url origin 2>/dev/null || echo 'unknown')"
      echo "File: $VERSION_FILE (${BUMP})"
      read -r -p "Proceed with version bump? [y/N] " CONFIRM
      if [ "$CONFIRM" != "y" ] && [ "$CONFIRM" != "Y" ]; then
        echo "Cancelled."
        exit 0
      fi

      case "$VERSION_FILE" in
        package.json)
          CURRENT=$(grep -oP '(?<="version": ")[^"]*' package.json)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "$BUMP" in
            major) sed -i 's/"version": "[^"]*"/"version": "'$((MAJOR + 1)).0.0'"/' package.json;;
            minor) sed -i 's/"version": "[^"]*"/"version": "'$MAJOR.$((MINOR + 1)).0'"/' package.json;;
            patch) sed -i 's/"version": "[^"]*"/"version": "'$MAJOR.$MINOR.$((PATCH + 1))'"/' package.json;;
          esac
          git add package.json
          NEW_VERSION=$(grep -oP '(?<="version": ")[^"]*' package.json)
          ;;
        Cargo.toml)
          CURRENT=$(grep -oP '(?<=^version = ")[^"]*' Cargo.toml | head -1)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "$BUMP" in
            major) sed -i "0,/^version = \".*\"/s//version = \"$((MAJOR + 1)).0.0\"/" Cargo.toml;;
            minor) sed -i "0,/^version = \".*\"/s//version = \"$MAJOR.$((MINOR + 1)).0\"/" Cargo.toml;;
            patch) sed -i "0,/^version = \".*\"/s//version = \"$MAJOR.$MINOR.$((PATCH + 1))\"/" Cargo.toml;;
          esac
          git add Cargo.toml
          NEW_VERSION=$(grep -oP '(?<=^version = ")[^"]*' Cargo.toml | head -1)
          ;;
        pyproject.toml)
          CURRENT=$(grep -oP '(?<=^version = ")[^"]*' pyproject.toml)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "$BUMP" in
            major) sed -i "s/^version = \".*\"/version = \"$((MAJOR + 1)).0.0\"/" pyproject.toml;;
            minor) sed -i "s/^version = \".*\"/version = \"$MAJOR.$((MINOR + 1)).0\"/" pyproject.toml;;
            patch) sed -i "s/^version = \".*\"/version = \"$MAJOR.$MINOR.$((PATCH + 1))\"/" pyproject.toml;;
          esac
          git add pyproject.toml
          NEW_VERSION=$(grep -oP '(?<=^version = ")[^"]*' pyproject.toml)
          ;;
        *.cabal|package.yaml)
          CURRENT=$(grep -oP '(?<=^version:\s*)\S+' "$VERSION_FILE" | head -1)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "$BUMP" in
            major) sed -i "s/^version:\s*.*/version: $((MAJOR + 1)).0.0/" "$VERSION_FILE";;
            minor) sed -i "s/^version:\s*.*/version: $MAJOR.$((MINOR + 1)).0/" "$VERSION_FILE";;
            patch) sed -i "s/^version:\s*.*/version: $MAJOR.$MINOR.$((PATCH + 1))/" "$VERSION_FILE";;
          esac
          git add "$VERSION_FILE"
          CURRENT=$(grep -oP '(?<=^version:\s*)\S+' "$VERSION_FILE" | head -1)
          NEW_VERSION="$CURRENT"
          ;;
        version.rb)
          CURRENT=$(grep -oP "(?<=VERSION = ')[^']*" version.rb || grep -oP '(?<=VERSION = ")[^"]*' version.rb)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "$BUMP" in
            major) sed -i "s/VERSION = ['\"][^'\"]*['\"]/VERSION = '$((MAJOR + 1)).0.0'/" version.rb;;
            minor) sed -i "s/VERSION = ['\"][^'\"]*['\"]/VERSION = '$MAJOR.$((MINOR + 1)).0'/" version.rb;;
            patch) sed -i "s/VERSION = ['\"][^'\"]*['\"]/VERSION = '$MAJOR.$MINOR.$((PATCH + 1))'/" version.rb;;
          esac
          git add version.rb
          CURRENT=$(grep -oP "(?<=VERSION = ')[^']*" version.rb || grep -oP '(?<=VERSION = ")[^"]*' version.rb)
          NEW_VERSION="$CURRENT"
          ;;
        *)
          IFS='.' read -r MAJOR MINOR PATCH < "$VERSION_FILE"
          case "$BUMP" in
            major) echo "$((MAJOR + 1)).0.0" > "$VERSION_FILE";;
            minor) echo "$MAJOR.$((MINOR + 1)).0" > "$VERSION_FILE";;
            patch) echo "$MAJOR.$MINOR.$((PATCH + 1))" > "$VERSION_FILE";;
          esac
          git add "$VERSION_FILE"
          NEW_VERSION=$(cat "$VERSION_FILE")
          ;;
      esac

      git commit --amend --no-edit
      git tag -a "v${NEW_VERSION}" -m "Version ${NEW_VERSION}"
      git push origin "v${NEW_VERSION}"
      echo "Version bumped to v${NEW_VERSION}"
    description: "Bump version based on last commit and push a git tag"
    context: "global"
git:
  pagers:
    - colorArg: always
      pager: delta --paging=never --line-numbers --hyperlinks --hyperlinks-file-link-format="lazygit-edit://{path}:{line}"
os:
  editPreset: "nvim-remote"
gui:
  nerdFontsVersion: "3"
