customCommands:
  - key: "C"
    command: |
      git commit -m "{{ .Form.Type }}{{if .Form.Scopes}}({{ .Form.Scopes }}){{end}}: {{ .Form.Description }}" \
      {{- if .Form.LongDescription }}
      -m "{{ .Form.LongDescription }}" \
      {{- end }}
      {{- if .Form.BreakingChange }}
      -m "BREAKING CHANGE: {{ .Form.BreakingChange }}"
      {{- end }}
    description: "commit with commitizen"
    context: "files"
    prompts:
      - type: "menu"
        title: "Select the type of change you are committing."
        key: "Type"
        options:
          - name: "Feature m"
            description: "a new feature"
            value: "feat"
          - name: "Fix p"
            description: "a bug fix"
            value: "fix"
          - name: "Documentation p"
            description: "Documentation only changes"
            value: "docs"
          - name: "Styles"
            description: "Changes that do not affect the meaning of the code (white-space, formatting, missing semi-colons, etc)"
            value: "style"
          - name: "Code Refactoring p"
            description: "A code change that neither fixes a bug nor adds a feature"
            value: "refactor"
          - name: "Performance Improvements p"
            description: "A code change that improves performance"
            value: "perf"
          - name: "Tests"
            description: "Adding missing tests or correcting existing tests"
            value: "test"
          - name: "Builds"
            description: "Changes that affect the build system or external dependencies (example scopes: gulp, broccoli, npm)"
            value: "build"
          - name: "Continuous Integration"
            description: "Changes to our CI configuration files and scripts (example scopes: Travis, Circle, BrowserStack, SauceLabs)"
            value: "ci"
          - name: "Chores p"
            description: "Other changes that don't modify src or test files"
            value: "chore"
          - name: "Reverts"
            description: "Reverts a previous commit"
            value: "revert"
      - type: "input"
        title: "Enter the scope(s) of this change."
        key: "Scopes"
      - type: "input"
        title: "Enter the short description of the change."
        key: "Description"
      - type: "input"
        title: "Enter a more detailed description (optional)."
        key: "LongDescription"
      - type: "input"
        title: "Describe the breaking change, if any (leave empty if none)."
        key: "BreakingChange"
      - type: "confirm"
        title: "Is the commit message correct?"
        body: |
          {{ .Form.Type }}{{if .Form.Scopes}}({{ .Form.Scopes }}){{end}}: {{ .Form.Description }}
          {{- if .Form.LongDescription }}

          {{ .Form.LongDescription }}
          {{- end }}
          {{- if .Form.BreakingChange }}

          BREAKING CHANGE: {{ .Form.BreakingChange }}
          {{- end }}
  - key: "B"
    command: |
      set LAST_COMMIT (git log -1 --pretty=%B)

      if string match -qr "BREAKING CHANGE" $LAST_COMMIT
        set BUMP major
      else if string match -qr "^feat" $LAST_COMMIT
        set BUMP minor
      else if string match -qr "^(fix|docs|refactor|perf|chore)" $LAST_COMMIT
        set BUMP patch
      else
        echo "No version bump needed (style/test/build/ci/revert)."
        exit 0
      end

      echo "$BUMP change detected."

      set VERSION_FILE ""
      for f in package.json Cargo.toml pyproject.toml package.yaml VERSION version.txt version.rb
        if test -f $f
          set VERSION_FILE $f
          break
        end
      end

      if test -z "$VERSION_FILE"
        for f in (string match -r '.*\.cabal' (command ls 2>/dev/null))
          if test -f $f
            set VERSION_FILE $f
            break
          end
        end
      end

      if test -z "$VERSION_FILE"
        if test -f version.rb
          set VERSION_FILE version.rb
        end
      end

      if test -z "$VERSION_FILE"
        echo "No version file found — skipping bump."
        exit 0
      end

      echo "Repo: "(git remote get-url origin 2>/dev/null || echo "unknown")
      echo "File: $VERSION_FILE ($BUMP)"
      read -P "Proceed with version bump? [y/N] " CONFIRM
      if test "$CONFIRM" != y -a "$CONFIRM" != Y
        echo "Cancelled."
        exit 0
      end

      switch $VERSION_FILE
        case package.json
          set CURRENT (grep -oP '(?<="version": ")[^"]*' package.json)
          set parts (string split '.' $CURRENT)
          set MAJOR $parts[1]; set MINOR $parts[2]; set PATCH $parts[3]
          switch $BUMP
            case major
              set NV (math $MAJOR + 1)
              sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$NV.0.0\"/" package.json
            case minor
              set NV (math $MINOR + 1)
              sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$MAJOR.$NV.0\"/" package.json
            case patch
              set NV (math $PATCH + 1)
              sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$MAJOR.$MINOR.$NV\"/" package.json
          end
          git add package.json
          set NEW_VERSION (grep -oP '(?<="version": ")[^"]*' package.json)

        case Cargo.toml
          set CURRENT (grep -oP '(?<=^version = ")[^"]*' Cargo.toml | head -1)
          set parts (string split '.' $CURRENT)
          set MAJOR $parts[1]; set MINOR $parts[2]; set PATCH $parts[3]
          switch $BUMP
            case major
              set NV (math $MAJOR + 1)
              sed -i "0,/^version = \".*\"/s//version = \"$NV.0.0\"/" Cargo.toml
            case minor
              set NV (math $MINOR + 1)
              sed -i "0,/^version = \".*\"/s//version = \"$MAJOR.$NV.0\"/" Cargo.toml
            case patch
              set NV (math $PATCH + 1)
              sed -i "0,/^version = \".*\"/s//version = \"$MAJOR.$MINOR.$NV\"/" Cargo.toml
          end
          git add Cargo.toml
          set NEW_VERSION (grep -oP '(?<=^version = ")[^"]*' Cargo.toml | head -1)

        case pyproject.toml
          set CURRENT (grep -oP '(?<=^version = ")[^"]*' pyproject.toml)
          set parts (string split '.' $CURRENT)
          set MAJOR $parts[1]; set MINOR $parts[2]; set PATCH $parts[3]
          switch $BUMP
            case major
              set NV (math $MAJOR + 1)
              sed -i "s/^version = \".*\"/version = \"$NV.0.0\"/" pyproject.toml
            case minor
              set NV (math $MINOR + 1)
              sed -i "s/^version = \".*\"/version = \"$MAJOR.$NV.0\"/" pyproject.toml
            case patch
              set NV (math $PATCH + 1)
              sed -i "s/^version = \".*\"/version = \"$MAJOR.$MINOR.$NV\"/" pyproject.toml
          end
          git add pyproject.toml
          set NEW_VERSION (grep -oP '(?<=^version = ")[^"]*' pyproject.toml)

        case *.cabal package.yaml
          set CURRENT (grep -oP '(?<=^version:\s*)\S+' $VERSION_FILE | head -1)
          set parts (string split '.' $CURRENT)
          set MAJOR $parts[1]; set MINOR $parts[2]; set PATCH $parts[3]
          switch $BUMP
            case major
              set NV (math $MAJOR + 1)
              sed -i "s/^version:\s*.*/version: $NV.0.0/" $VERSION_FILE
            case minor
              set NV (math $MINOR + 1)
              sed -i "s/^version:\s*.*/version: $MAJOR.$NV.0/" $VERSION_FILE
            case patch
              set NV (math $PATCH + 1)
              sed -i "s/^version:\s*.*/version: $MAJOR.$MINOR.$NV/" $VERSION_FILE
          end
          git add $VERSION_FILE
          set CURRENT (grep -oP '(?<=^version:\s*)\S+' $VERSION_FILE | head -1)
          set NEW_VERSION $CURRENT

        case version.rb
          set CURRENT (grep -oP "(?<=VERSION = ')[^']*" version.rb || grep -oP '(?<=VERSION = ")[^"]*' version.rb)
          set parts (string split '.' $CURRENT)
          set MAJOR $parts[1]; set MINOR $parts[2]; set PATCH $parts[3]
          switch $BUMP
            case major
              set NV (math $MAJOR + 1)
              sed -i "s/VERSION = ['\"][^'\"]*['\"]/VERSION = '$NV.0.0'/" version.rb
            case minor
              set NV (math $MINOR + 1)
              sed -i "s/VERSION = ['\"][^'\"]*['\"]/VERSION = '$MAJOR.$NV.0'/" version.rb
            case patch
              set NV (math $PATCH + 1)
              sed -i "s/VERSION = ['\"][^'\"]*['\"]/VERSION = '$MAJOR.$MINOR.$NV'/" version.rb
          end
          git add version.rb
          set CURRENT (grep -oP "(?<=VERSION = ')[^']*" version.rb || grep -oP '(?<=VERSION = ")[^"]*' version.rb)
          set NEW_VERSION $CURRENT

        case '*'
          set parts (string split '.' (read <$VERSION_FILE))
          set MAJOR $parts[1]; set MINOR $parts[2]; set PATCH $parts[3]
          switch $BUMP
            case major
              echo (math $MAJOR + 1).0.0 >$VERSION_FILE
            case minor
              echo $MAJOR.(math $MINOR + 1).0 >$VERSION_FILE
            case patch
              echo $MAJOR.$MINOR.(math $PATCH + 1) >$VERSION_FILE
          end
          git add $VERSION_FILE
          set NEW_VERSION (cat $VERSION_FILE)
      end

      git commit --amend --no-edit
      git tag -a v$NEW_VERSION -m "Version $NEW_VERSION"
      git push origin v$NEW_VERSION
      echo "Version bumped to v$NEW_VERSION"
    description: "Bump version based on last commit and push a git tag"
    context: "global"
git:
  pagers:
    - pager: delta --paging=never --line-numbers --hyperlinks --hyperlinks-file-link-format="lazygit-edit://{path}:{line}"
      colorArg: always
os:
  editPreset: "nvim-remote"
gui:
  nerdFontsVersion: "3"
